name: Thử nghiệm đọc file README #Tên quy trình

on:
  push:
    branches: [ "main" ] #Chạy khi có code mới đẩy lển nhánh main

jobs:
  thuc_hanh_doc_file:
    runs-on:  ubuntu-latest   #Mượn máy ảo Ubuntu của Gthub để chạy

    steps:
      - name: Bước 1 - Xin chào
        run: echo "Hello HUTECH!"  #Lệnh in ra màn hình

      - name: Bước 2 - Tải Code
        uses: actions/checkout@v6.0.2  #Robot tự dộng copy code

      - name: Bước 3 - Đọc File
        run: cat README.md  #Mở rộng fike README.md để xem

